# docker-compose.yml
# Builds drs-verify from the existing Dockerfile in the repo root.
# Run: docker-compose up -d
# The verify service will be reachable at http://localhost:8080

version: "3.9"

services:
  drs-verify:
    build:
      context: ../../drs-verify
      dockerfile: Dockerfile.local
    ports:
      - "8080:8080"
    environment:
      LISTEN_ADDR: ":8080"
      LOG_LEVEL: "info"
    restart: unless-stopped
