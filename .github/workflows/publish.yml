name: Publish Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drs-core

      - name: Test drs-core
        run: cd drs-core && cargo test

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: drs-sdk/pnpm-lock.yaml

      - name: Install SDK deps
        run: cd drs-sdk && pnpm install --frozen-lockfile

      - name: Test drs-sdk
        run: cd drs-sdk && pnpm test

  publish-npm:
    name: Publish @drs/sdk to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: drs-sdk/pnpm-lock.yaml

      - name: Install deps
        run: cd drs-sdk && pnpm install --frozen-lockfile

      - name: Build
        run: cd drs-sdk && pnpm build

      - name: Publish
        run: cd drs-sdk && pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    name: Publish drs-core to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drs-core

      - name: Publish to crates.io
        run: cd drs-core && cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
