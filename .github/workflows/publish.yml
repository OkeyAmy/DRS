name: Publish Packages

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/drs-verify

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run tests before publishing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drs-core

      - name: Test drs-core
        run: cd drs-core && cargo test

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: drs-verify/go.mod
          cache-dependency-path: drs-verify/go.sum

      - name: Test drs-verify
        run: cd drs-verify && go test ./...

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: drs-sdk/pnpm-lock.yaml

      - name: Install SDK deps
        run: cd drs-sdk && pnpm install --frozen-lockfile

      - name: Test drs-sdk
        run: cd drs-sdk && pnpm test

  publish-npm:
    name: Publish @okeyamy/drs-sdk to npm
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node (with npm registry)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          cache-dependency-path: drs-sdk/pnpm-lock.yaml

      - name: Install deps
        run: cd drs-sdk && pnpm install --frozen-lockfile

      - name: Build
        run: cd drs-sdk && pnpm build

      - name: Publish (skip if version exists)
        run: |
          cd drs-sdk
          OUTPUT=$(pnpm publish --access public --no-git-checks 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -qE "already exists|previously published"; then
              echo "Version already on npm — skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-crate:
    name: Publish drs-core to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: drs-core

      - name: Publish (skip if version exists)
        run: |
          cd drs-core
          OUTPUT=$(cargo publish --token "$CARGO_REGISTRY_TOKEN" 2>&1) && echo "$OUTPUT" || {
            if echo "$OUTPUT" | grep -q "already exists"; then
              echo "Version already on crates.io — skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-docker:
    name: Publish drs-verify to GHCR
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push drs-verify image
        uses: docker/build-push-action@v6
        with:
          context: drs-verify
          file: drs-verify/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
